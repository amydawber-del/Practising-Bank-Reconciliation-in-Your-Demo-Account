<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Practising Bank Reconciliation in Your Demo Account</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#161B33;
  --ink:#22273B;
  --grey:#6B7280;
  --grey-light:#9AA1B1;
  --lavender:#EDEBFB;
  --lavender-strong:#DCD6F7;
  --blue-pale:#E7F1FC;
  --blue-strong:#CFE3FA;
  --warning-bg:#FBF2DE;
  --warning-border:#E9CE93;
  --white:#FFFFFF;
  --border:#E7E8EF;
  --shadow: 0 2px 10px rgba(22,27,51,0.06), 0 1px 2px rgba(22,27,51,0.04);
  --radius: 18px;
  --radius-sm: 12px;
  --font: 'DM Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

* { box-sizing: border-box; }

.ic { width: 14px; height: 14px; flex: none; display: block; }

html, body {
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: #F4F5FA;
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
}

/* Fixes a real bug: an element's `hidden` attribute can be silently
   overridden by any author CSS rule that sets `display` on the same
   element with equal specificity (e.g. `.state-screen{display:flex}`).
   Toggling this explicit, !important class instead guarantees hidden
   content actually stays hidden, regardless of what else targets it. */
.hidden { display: none !important; }

#root {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/*
 * The shell is the box Rocketlane actually sees (target 1080 x 600,
 * landscape). Its size is decided by CSS alone — min() picks whichever
 * of "full viewport width", "1080px", or "the width that 100vh would
 * give at a 1080:600 ratio" is smallest, and aspect-ratio locks the
 * shape to landscape no matter what. This does NOT depend on any JS
 * running correctly, so it can't silently end up portrait.
 * Inside it, .stage is a FIXED 1080x600 canvas that gets CSS-scaled
 * (via JS + ResizeObserver, see below) to fit the shell — so every
 * page is designed once, at one size, and just scales as a block.
 */
.flipbook-shell {
  position: relative;
  width: min(100vw, 1080px, calc(100vh * 1.8));
  aspect-ratio: 1080 / 600;
  background: var(--white);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: var(--shadow);
}
@media (max-width: 1080px), (max-height: 600px) {
  .flipbook-shell { border-radius: 0; box-shadow: none; }
}

.stage {
  position: absolute;
  top: 0; left: 0;
  width: 1080px;
  height: 600px;
  transform-origin: top left;
  display: flex;
  flex-direction: column;
}

/* ---------- Page stack ---------- */
.page-viewport {
  position: relative;
  flex: 1 1 auto;
  min-height: 0;
  overflow: hidden;
}

.page {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  padding: 30px 46px 12px;
  opacity: 0;
  transform: translateX(28px);
  transition: opacity 320ms ease, transform 320ms ease;
  pointer-events: none;
}
.page.active {
  opacity: 1;
  transform: translateX(0);
  pointer-events: auto;
}
.page.exit-left { transform: translateX(-28px); }

@media (prefers-reduced-motion: reduce) {
  .page { transition: opacity 160ms linear; transform: none !important; }
}

/* ---------- Shared type ---------- */
.eyebrow {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--grey-light);
  margin: 0 0 6px;
}
h1.page-title {
  font-size: 27px;
  line-height: 1.15;
  font-weight: 700;
  color: var(--navy);
  margin: 0 0 10px;
}
p.lede {
  font-size: 14px;
  line-height: 1.55;
  color: var(--grey);
  margin: 0 0 14px;
}

/* ---------- Cover page (landscape: copy centred, no client image) ---------- */
.cover-flex { display: flex; gap: 36px; height: 100%; align-items: center; }
.cover-left { flex: 1.15; max-width: 560px; display: flex; flex-direction: column; }
.cover-image {
  flex: 1;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.cover-image img {
  width: 100%;
  height: auto;
  max-height: 92%;
  object-fit: contain;
  display: block;
}
.cover-word { font-size: 13px; font-weight: 700; letter-spacing: 0.06em; color: var(--navy); }
.cover-word span { color: #7C6FE0; }
.cover-callout {
  margin-top: 16px;
  background: var(--blue-pale);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-size: 13px;
  color: var(--ink);
  font-weight: 500;
}
.cover-pill-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
.cover-pill {
  font-size: 12px;
  font-weight: 700;
  padding: 6px 13px;
  border-radius: 999px;
  background: var(--lavender);
  color: var(--navy);
}
.cover-cta {
  margin-top: 14px;
  font-size: 12px;
  color: var(--grey-light);
}

/* ---------- Guidance pages: eyebrow + title + a grid of field blocks,
   using the extra landscape width. One guidance record's worth of content
   per page, spilling onto a "Continued" page when it doesn't all fit. ---------- */
.fields-grid {
  flex: 1 1 auto;
  min-height: 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px 24px;
  align-content: start;
  overflow: hidden;
}
.fields-grid.single-col { grid-template-columns: 1fr; }

.field-block { min-width: 0; }
.field-block .fk {
  display: flex; align-items: center; gap: 6px;
  font-weight: 700; color: var(--grey); font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.05em;
  margin-bottom: 4px;
}
.field-block .fk .ic { width: 14px; height: 14px; color: var(--grey-light); }
.field-block-body { font-size: 13.5px; line-height: 1.5; color: var(--ink); }
.field-block-body p { margin: 0 0 6px; }
.field-block-body p:last-child { margin-bottom: 0; }
.field-block-body ol { margin: 0; padding-left: 18px; }
.field-block-body ol li { margin-bottom: 4px; }
.field-block-body ol li:last-child { margin-bottom: 0; }

/* HOW is the practical, instructional field — made slightly more prominent
   with the same tinted-callout treatment used for notes on the other guide. */
.field-block.field-how {
  grid-column: 1 / -1;
  background: var(--lavender);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
}
.field-block.field-how .fk { color: var(--navy); }
.field-block.field-how .fk .ic { color: var(--navy); }
.field-block.field-how .field-block-body { color: var(--ink); font-weight: 500; }

/* ---------- Final page (landscape: copy left, closing right) ---------- */
.final-flex { display: flex; gap: 40px; height: 100%; align-items: center; }
.final-left { flex: 1.4; }
.final-copy { font-size: 14px; color: var(--ink); line-height: 1.55; margin-bottom: 12px; }
.final-note {
  margin-top: 4px;
  background: var(--warning-bg);
  border: 1px solid var(--warning-border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-size: 13px;
  color: #6B5518;
  line-height: 1.5;
}
.final-right {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  text-align: center;
}
.final-right .word { font-size: 15px; font-weight: 700; color: var(--navy); letter-spacing: 0.06em; }
.restart-btn {
  background: var(--lavender);
  color: var(--navy);
  border: none;
  border-radius: 999px;
  padding: 10px 20px;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}
.restart-btn:focus-visible { outline: 2px solid var(--navy); outline-offset: 2px; }

/* ---------- Footer / nav ---------- */
.footer {
  flex: none;
  padding: 10px 46px 18px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  border-top: 1px solid var(--border);
  background: var(--white);
}
.progress-track {
  height: 4px;
  border-radius: 999px;
  background: var(--border);
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg,#7C6FE0,#5A8DEE);
  border-radius: 999px;
  transition: width 250ms ease;
}
.nav-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.nav-btn {
  display: flex; align-items: center; gap: 6px;
  background: var(--lavender);
  color: var(--navy);
  border: none;
  border-radius: 999px;
  padding: 9px 18px;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  min-width: 90px;
  justify-content: center;
}
.nav-btn:disabled { opacity: 0.35; cursor: default; }
.nav-btn:focus-visible { outline: 2px solid var(--navy); outline-offset: 2px; }
.page-count {
  font-size: 12px;
  color: var(--grey-light);
  font-weight: 600;
  white-space: nowrap;
}

/* ---------- Loading / error ---------- */
.state-screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px; padding: 30px; text-align: center; background: var(--white);
}
.spinner {
  width: 30px; height: 30px; border-radius: 999px;
  border: 3px solid var(--lavender-strong);
  border-top-color: var(--navy);
  animation: spin 800ms linear infinite;
}
@media (prefers-reduced-motion: reduce) { .spinner { animation-duration: 1600ms; } }
@keyframes spin { to { transform: rotate(360deg); } }
.state-title { font-size: 15px; font-weight: 700; color: var(--navy); }
.state-copy { font-size: 13px; color: var(--grey); line-height: 1.5; max-width: 420px; }
.retry-btn {
  background: var(--navy); color: #fff; border: none; border-radius: 999px;
  padding: 10px 20px; font-family: var(--font); font-weight: 600; font-size: 13px; cursor: pointer;
}
.retry-btn:focus-visible { outline: 2px solid var(--navy); outline-offset: 3px; }

/* Off-screen measuring rig — a sibling of .stage, NOT scaled, so
   measurements are always taken at true 1:1 pixel size regardless
   of how small the shell has been scaled down to fit the screen. */
#measure-rig {
  position: absolute;
  visibility: hidden;
  pointer-events: none;
  left: -9999px;
  top: 0;
}

.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

</style>
</head>
<body>
<div id="root">
  <div class="flipbook-shell" id="shell" role="region" aria-roledescription="carousel" aria-label="Practising Bank Reconciliation in Your Demo Account guide">
    <div class="stage" id="stage">

      <div class="page-viewport" id="viewport">
        <!-- Loading state -->
        <div class="state-screen" id="state-loading">
          <div class="spinner" aria-hidden="true"></div>
          <div class="state-title">Loading your bank reconciliation guide&hellip;</div>
        </div>

        <!-- Error state -->
        <div class="state-screen hidden" id="state-error">
          <div class="state-title">We couldn't load this guide</div>
          <div class="state-copy" id="error-copy">Something went wrong while loading the latest guidance. Please try again in a moment.</div>
          <button class="retry-btn" id="retry-btn" type="button">Retry</button>
        </div>

        <!-- Pages get injected here once data has loaded -->
        <div id="pages-host" aria-live="polite"></div>
      </div>

      <!-- Footer / navigation, only shown once content has loaded -->
      <div class="footer hidden" id="footer">
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="nav-row">
          <button class="nav-btn" id="prev-btn" type="button" aria-label="Previous page">&larr; Prev</button>
          <span class="page-count" id="page-count">1 of 1</span>
          <button class="nav-btn" id="next-btn" type="button" aria-label="Next page">Next &rarr;</button>
        </div>
      </div>

    </div>
  </div>
</div>

<span id="sr-page-announce" class="sr-only" aria-live="polite"></span>
<div id="measure-rig" aria-hidden="true"></div>

/* ---------- Utility: escaping (never trust sheet content) ---------- */
function escapeHtml(str) {
  return String(str == null ? '' : str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

/* Splits raw cell text into paragraphs, preserving blank-line breaks. */
function splitParagraphs(text) {
  return String(text || '')
    .replace(/\r\n/g, '\n')
    .split(/\n{1,}/)
    .map(function (p) { return p.trim(); })
    .filter(Boolean);
}

// Recognises simple numbered-step patterns ("1.", "1)", "Step 1:") across several lines.
var STEP_PATTERN = /^\s*(?:step\s*)?\d+[\.\)\:]\s*/i;
function looksLikeNumberedSteps(paragraphs) {
  if (paragraphs.length < 2) return false;
  var matches = 0;
  paragraphs.forEach(function (p) { if (STEP_PATTERN.test(p)) matches++; });
  return matches >= Math.ceil(paragraphs.length * 0.6);
}
function stripStepMarker(text) { return text.replace(STEP_PATTERN, '').trim(); }

function fieldBodyHtml(fieldKey, rawText) {
  var paragraphs = splitParagraphs(rawText);
  if (fieldKey === 'how' && looksLikeNumberedSteps(paragraphs)) {
    return '<ol>' + paragraphs.map(function (p) {
      return '<li>' + escapeHtml(stripStepMarker(p)) + '</li>';
    }).join('') + '</ol>';
  }
  return paragraphs.map(function (p) { return '<p>' + escapeHtml(p) + '</p>'; }).join('');
}

/* ============================================================================
 * DATA NORMALISATION
 * apps-script.gs already returns clean, already-filtered/sorted objects with
 * camelCase keys (guidance/who/what/where/when/why/how) — this just guards
 * against a malformed or unexpected response shape.
 * ============================================================================ */
function normaliseResponsePayload(payload) {
  var list = [];
  if (Array.isArray(payload)) list = payload;
  else if (payload && Array.isArray(payload.data)) list = payload.data;

  return list.filter(function (r) {
    if (!r) return false;
    return !!(r.guidance || r.who || r.what || r.where || r.when || r.why || r.how);
  });
}

/**
 * Turns a raw Code.gs response into a records array, but FIRST checks for
 * success === false (a real backend error — wrong sheet name, sheet not
 * found, etc.) and throws a proper error with that message attached, so
 * the UI can show the real cause instead of a generic "no guidance yet".
 * Always logs the raw payload too, so anyone debugging can see exactly
 * what Code.gs returned.
 */
function processPayload(payload) {
  console.log('Bank Reconciliation guide — raw response from Code.gs:', payload);

  if (payload && payload.success === false) {
    var err = new Error(payload.error || 'The sheet reported an error.');
    err.isBackendError = true;
    throw err;
  }

  return normaliseResponsePayload(payload);
}

/* ---------- Data loading: fetch first, JSONP fallback ---------- */

function loadData() {
  if (CONFIG.useSampleData) {
    return Promise.resolve(SAMPLE_DATA);
  }

  return fetchWithTimeout(CONFIG.webAppUrl, CONFIG.fetchTimeoutMs)
    .then(processPayload)
    .catch(function (fetchErr) {
      if (fetchErr && fetchErr.isBackendError) throw fetchErr;
      console.warn('fetch() failed, falling back to JSONP:', fetchErr);
      return loadViaJsonp(CONFIG.webAppUrl, CONFIG.jsonpTimeoutMs)
        .then(processPayload);
    });
}

function fetchWithTimeout(url, timeoutMs) {
  const controller = new AbortController();
  const timer = setTimeout(function () { controller.abort(); }, timeoutMs);
  return fetch(url, { signal: controller.signal, cache: 'no-store' })
    .then(function (res) {
      clearTimeout(timer);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .catch(function (err) {
      clearTimeout(timer);
      throw err;
    });
}

function loadViaJsonp(url, timeoutMs) {
  return new Promise(function (resolve, reject) {
    const cbName = '__flipbookCb' + Math.random().toString(36).slice(2);
    const script = document.createElement('script');
    let settled = false;

    const cleanup = function () {
      // Replaced with a no-op rather than deleted: if the response arrives
      // late (after we've already timed out and moved on), it calls a
      // harmless function instead of throwing a ReferenceError.
      window[cbName] = function () {};
      if (script.parentNode) script.parentNode.removeChild(script);
      clearTimeout(timer);
    };

    const timer = setTimeout(function () {
      if (settled) return;
      settled = true;
      cleanup();
      reject(new Error('JSONP request timed out'));
    }, timeoutMs);

    window[cbName] = function (payload) {
      if (settled) return;
      settled = true;
      cleanup();
      resolve(payload);
    };

    script.onerror = function () {
      if (settled) return;
      settled = true;
      cleanup();
      reject(new Error('JSONP script failed to load'));
    };

    const sep = url.indexOf('?') === -1 ? '?' : '&';
    script.src = url + sep + 'callback=' + cbName;
    document.body.appendChild(script);
  });
}

/**
 * Measures the ACTUAL rendered height of the footer, by cloning real markup
 * into the (unscaled, off-screen) measuring rig. Far more reliable than a
 * hard-coded pixel guess.
 */
function measureChromeHeights() {
  const rig = document.getElementById('measure-rig');
  rig.innerHTML = '';
  rig.style.width = CONFIG.stageWidth + 'px';

  const footerClone = document.getElementById('footer').cloneNode(true);
  footerClone.classList.remove('hidden');
  footerClone.style.position = 'static';
  rig.appendChild(footerClone);
  const footerHeight = footerClone.offsetHeight;
  rig.removeChild(footerClone);

  return { footerHeight: footerHeight };
}

/* ============================================================================
 * PAGINATION
 * Each guidance record gets its own page: eyebrow + title + a grid of field
 * blocks (Who/What/Where/When/Why/How, only the populated ones). Content is
 * measured for real in the off-screen rig — never assumed — so a page only
 * ever holds as many fields as truly fit, and long records spill onto a
 * "Continued" page automatically rather than ever needing a scrollbar.
 * ============================================================================ */
function paginateGuidance(records, availableHeight, gridWidth) {
  const rig = document.getElementById('measure-rig');
  const pages = []; // array of { recordIndex, fieldsSubset, continued, singleCol }

  records.forEach(function (record, recordIndex) {
    const allFields = FIELD_ORDER.filter(function (f) { return record[f] && String(record[f]).trim(); });
    let remaining = allFields.slice();
    let continued = false;

    function measure(fieldsSubset, singleCol) {
      rig.style.width = gridWidth + 'px';
      const wrapper = document.createElement('div');
      wrapper.innerHTML = buildGuidancePageHtml(record, recordIndex, records.length, fieldsSubset, continued, singleCol);
      rig.appendChild(wrapper);
      const height = wrapper.offsetHeight + 10; // small buffer for sub-pixel/rendering rounding
      rig.removeChild(wrapper);
      return height;
    }

    while (remaining.length) {
      let bestN = 0;
      let bestSingleCol = true;

      outer:
      for (let n = remaining.length; n >= 1; n--) {
        const slice = remaining.slice(0, n);
        const twoColFits = n >= 2 && measure(slice, false) <= availableHeight;
        const oneColFits = measure(slice, true) <= availableHeight;
        if (twoColFits || oneColFits) {
          bestN = n;
          // Prefer two columns when it fits 2+ fields — reads more balanced
          // and makes better use of the extra landscape width.
          bestSingleCol = !twoColFits;
          break outer;
        }
      }

      if (bestN === 0) {
        // Even a single field doesn't fit at normal size (an unusually long
        // entry) — render it alone anyway rather than lose the content.
        console.warn('Bank Recon guide: a single field could not be made to fit on one page — rendering it anyway.', record.guidance, remaining[0]);
        bestN = 1;
        bestSingleCol = true;
      }

      const committed = remaining.slice(0, bestN);
      remaining = remaining.slice(bestN);

      pages.push({
        recordIndex: recordIndex,
        totalRecords: records.length,
        fieldsSubset: committed,
        continued: continued,
        singleCol: bestSingleCol
      });

      continued = true; // any further page for this record is a continuation
    }
  });

  return pages;
}

/* ============================================================================
 * APP STATE + RENDERING
 * ============================================================================ */
let PAGES = []; // array of { type, html } — 'cover' | 'guidance' | 'final'
let currentIndex = 0;

function renderAllPages() {
  const host = document.getElementById('pages-host');
  host.innerHTML = '';
  PAGES.forEach(function (p, i) {
    const div = document.createElement('div');
    div.className = 'page' + (i === 0 ? ' active' : '');
    div.setAttribute('data-index', i);
    div.setAttribute('role', 'group');
    div.setAttribute('aria-roledescription', 'page');
    div.setAttribute('aria-label', 'Page ' + (i + 1) + ' of ' + PAGES.length);
    div.innerHTML = p.html;
    host.appendChild(div);
  });
}

function goToPage(index) {
  if (index < 0 || index >= PAGES.length) return;
  const pages = document.querySelectorAll('.page');
  pages.forEach(function (el, i) {
    el.classList.remove('active', 'exit-left');
    if (i === index) el.classList.add('active');
    else if (i < index) el.classList.add('exit-left');
  });
  currentIndex = index;
  updateFooter();
}

function updateFooter() {
  document.getElementById('page-count').textContent = (currentIndex + 1) + ' of ' + PAGES.length;
  document.getElementById('progress-fill').style.width = (((currentIndex + 1) / PAGES.length) * 100) + '%';
  document.getElementById('prev-btn').disabled = currentIndex === 0;
  document.getElementById('next-btn').disabled = currentIndex === PAGES.length - 1;
  const announce = document.getElementById('sr-page-announce');
  if (announce) announce.textContent = 'Page ' + (currentIndex + 1) + ' of ' + PAGES.length;
}

function attachNav() {
  document.getElementById('prev-btn').addEventListener('click', function () { goToPage(currentIndex - 1); });
  document.getElementById('next-btn').addEventListener('click', function () { goToPage(currentIndex + 1); });

  document.addEventListener('keydown', function (e) {
    if (document.getElementById('footer').classList.contains('hidden')) return;
    if (e.key === 'ArrowRight') goToPage(currentIndex + 1);
    if (e.key === 'ArrowLeft') goToPage(currentIndex - 1);
  });

  let touchStartX = null;
  const viewport = document.getElementById('viewport');
  viewport.addEventListener('touchstart', function (e) { touchStartX = e.changedTouches[0].clientX; }, { passive: true });
  viewport.addEventListener('touchend', function (e) {
    if (touchStartX === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 40) { dx < 0 ? goToPage(currentIndex + 1) : goToPage(currentIndex - 1); }
    touchStartX = null;
  }, { passive: true });

  document.getElementById('pages-host').addEventListener('click', function (e) {
    if (e.target && e.target.id === 'restart-btn') goToPage(0);
  });
}

function showError(message) {
  document.getElementById('state-loading').classList.add('hidden');
  document.getElementById('state-error').classList.remove('hidden');
  document.getElementById('error-copy').textContent = message;
}

/* ============================================================================
 * STAGE SCALING
 * The shell's on-screen size is decided entirely by CSS (min()/aspect-ratio
 * on .flipbook-shell guarantees a landscape 1080:600 box regardless of
 * viewport). This JS just watches that box with a ResizeObserver and scales
 * the fixed-size 1080x600 .stage to match, so pagination measurements never
 * need to account for the device at all — .stage is always 1080x600 pre-scale.
 * ============================================================================ */
function scaleStageToShell() {
  const shell = document.getElementById('shell');
  const stage = document.getElementById('stage');
  const scale = shell.clientWidth / CONFIG.stageWidth;
  stage.style.transform = 'scale(' + scale + ')';
}

function init() {
  const shell = document.getElementById('shell');
  scaleStageToShell();

  if (window.ResizeObserver) {
    new ResizeObserver(scaleStageToShell).observe(shell);
  } else {
    window.addEventListener('resize', scaleStageToShell);
    window.addEventListener('orientationchange', scaleStageToShell);
  }

  attachNav();
  document.getElementById('retry-btn').addEventListener('click', function () {
    document.getElementById('state-error').classList.add('hidden');
    document.getElementById('state-loading').classList.remove('hidden');
    boot();
  });
  boot();
}

function boot() {
  loadData()
    .then(function (records) {
      // Wait for the DM Sans web font to actually finish loading before we
      // measure anything, so text doesn't wrap differently once the web
      // font swaps in a moment after the fallback system font first shows.
      const fontsReady = (document.fonts && document.fonts.ready) ? document.fonts.ready : Promise.resolve();
      return fontsReady.then(function () { return records; });
    })
    .then(function (records) {
      if (!records.length) {
        showError('No active guidance was found in the sheet yet. Please check back shortly, or contact the Street team.');
        return;
      }

      const chrome = measureChromeHeights();
      const PAGE_PADDING_TOP = 30;
      const PAGE_PADDING_BOTTOM = 12;
      const SAFETY_MARGIN = 20;
      const availableHeight = CONFIG.stageHeight - chrome.footerHeight - PAGE_PADDING_TOP - PAGE_PADDING_BOTTOM - SAFETY_MARGIN;
      const gridWidth = CONFIG.stageWidth - (46 * 2); // matches .page horizontal padding

      const guidancePages = paginateGuidance(records, availableHeight, gridWidth);

      PAGES = [{ type: 'cover', html: buildCoverPageHtml() }];
      guidancePages.forEach(function (gp) {
        PAGES.push({
          type: 'guidance',
          html: buildGuidancePageHtml(records[gp.recordIndex], gp.recordIndex, gp.totalRecords, gp.fieldsSubset, gp.continued, gp.singleCol)
        });
      });
      PAGES.push({ type: 'final', html: buildFinalPageHtml() });

      renderAllPages();
      document.getElementById('state-loading').classList.add('hidden');
      document.getElementById('footer').classList.remove('hidden');
      updateFooter();
    })
    .catch(function (err) {
      console.error('Failed to load bank reconciliation guidance:', err);
      if (err && err.isBackendError) {
        // A real Code.gs error (wrong sheet name, sheet not found, etc.) — show it directly, it's actionable.
        showError(err.message);
      } else {
        showError('We couldn\'t load this guide right now. Please check your connection and try again.');
      }
    });
}

document.addEventListener('DOMContentLoaded', init);

<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Practising Bank Reconciliation in Your Demo Account</title>
<style>

/* ==========================================================================
   THEME TOKENS
   ========================================================================== */
:root {
  --text--dark--50: #19191e;
  --brand--black: #242326;
  --text--dark--40: #4c4d57;
  --text--dark--30: #777989;
  --true-black: #000000;
  --transparent: #fff0;
  --card-light-grey: #f8f8f8;
  --text--white--30: #979797;
  --text--light--40: #b2b2b2;
  --accent--blue--300: #527dff;
  --accent-blue--200: #7a9cff;
  --text--dark--20: #a8aabb;
  --action-primary-blue: #2147f4;
  --white: #ffffff;
  --light-grey: #cccccc;
  --text-dark-10: #dfe0ec;
  --ui--underline--light-grey: #e5e5e5;
  --success-green: #bde4b9;
  --brand--yellow: #f1c238;
  --brand-accent--mandarin-light: #f6be9d;
  --accent-blue--100: #a3baff;
  --brand-accent--dusty-red-light: #f9b4bc;
  --brand--secondary--lightgreen: #beffd8;
  --accent-blue--50: #b8caff;
  --white-smoke: #fde8eb;
  --nav-opacity: #ffffff0d;
  --brand-accent--cream: #f5ede5;

  /* Fixed layout regions inside the 1080x600 landscape canvas */
  --canvas-w: 1080px;
  --canvas-h: 600px;
  --header-h: 60px;
  --nav-h: 56px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden; /* never scroll the outer document, even when embedded */
  background: var(--white);
  font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
  font-size: 14px;
  line-height: 20px;
  color: #333;
  min-height: 100%;
  -webkit-font-smoothing: antialiased;
}

button { font-family: inherit; }

/* ==========================================================================
   CANVAS — fixed 1080 x 600 landscape, never scrolls
   ========================================================================== */
.flip-canvas {
  width: var(--canvas-w);
  height: var(--canvas-h);
  max-width: 100%;
  max-height: 100%;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
  box-sizing: border-box;
  background: var(--white);
  display: flex;
  flex-direction: column;
}

/* ==========================================================================
   HEADER
   ========================================================================== */
.fb-header {
  flex: 0 0 var(--header-h);
  height: var(--header-h);
  box-sizing: border-box;
  background: var(--brand--black);
  color: var(--white);
  display: flex;
  align-items: center;
  padding: 0 24px;
  overflow: hidden;
}

.fb-header__title {
  font-size: 19px;
  font-weight: 700;
  line-height: 1.25;
  letter-spacing: 0.1px;
}

.fb-header__title-sub {
  display: block;
  font-size: 13px;
  font-weight: 400;
  color: var(--accent-blue--100);
  margin-top: 2px;
}

/* ==========================================================================
   PAGE VIEWPORT — the only area that changes between pages
   ========================================================================== */
.page-viewport {
  flex: 1 1 auto;
  position: relative;
  overflow: hidden;
  background: var(--white);
  min-height: 0;
}

.pages-root {
  position: absolute;
  inset: 0;
}

.page {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  opacity: 0;
  transform: translateX(24px);
  transition: opacity 0.28s ease, transform 0.28s ease;
  pointer-events: none;
  visibility: hidden;
}

.page.is-active {
  opacity: 1;
  transform: translateX(0);
  pointer-events: auto;
  visibility: visible;
}

.page.is-leaving-back {
  transform: translateX(-24px);
}

@media (prefers-reduced-motion: reduce) {
  .page {
    transition: opacity 0.01ms linear !important;
    transform: none !important;
  }
}

.page-inner {
  box-sizing: border-box;
  width: 100%;
  height: 100%;
  padding: 20px 44px 16px;
  overflow: hidden; /* pagination guarantees fit; this is a safety net, not a strategy */
  display: flex;
  flex-direction: column;
}

/* Pagination measures real .page-inner elements at runtime (see script.js),
   so children must never flex-shrink below their content size — otherwise
   flexbox would quietly compress overflowing content instead of reporting
   it, and true overflow would never be detected. */
.page-inner > * {
  flex-shrink: 0;
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

/* ==========================================================================
   SECTION HEADINGS (per guidance record)
   ========================================================================== */
.section-title {
  font-size: 21px;
  font-weight: 700;
  color: var(--text--dark--50);
  line-height: 1.28;
  margin: 0 0 4px;
}

.section-continued {
  display: inline-block;
  font-size: 11.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--action-primary-blue);
  background: var(--accent-blue--50);
  border-radius: 999px;
  padding: 3px 10px;
  margin-bottom: 10px;
}

.section-intro-space { margin-bottom: 12px; }

/* ==========================================================================
   CARDS
   ========================================================================== */
.card-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
  overflow: hidden;
}

.card-grid--two-col {
  grid-template-columns: 1fr 1fr;
}

.card {
  border-radius: 12px;
  padding: 12px 14px;
  background: var(--card-light-grey);
  border: 1px solid var(--ui--underline--light-grey);
  box-shadow: 0 1px 2px rgba(25, 25, 30, 0.04);
  min-width: 0;
}

.card-grid--two-col .card { grid-column: span 1; }
.card--span-full { grid-column: 1 / -1 !important; }

.card__label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin: 0 0 5px;
}

.card__label-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex: 0 0 8px;
}

.card__body {
  font-size: 14.5px;
  line-height: 1.42;
  color: var(--text--dark--40);
}

.card__body p { margin: 0 0 6px; }
.card__body p:last-child { margin-bottom: 0; }

.card__body ol {
  margin: 0;
  padding-left: 19px;
}
.card__body ol li {
  margin-bottom: 5px;
  padding-left: 2px;
}
.card__body ol li:last-child { margin-bottom: 0; }

/* Accent colours per field, applied consistently across the guide */
.card--who .card__label { color: #2147c9; }
.card--who .card__label-dot { background: var(--accent--blue--300); }
.card--who { border-top: 3px solid var(--accent--blue--300); }

.card--what .card__label { color: #8a6a05; }
.card--what .card__label-dot { background: var(--brand--yellow); }
.card--what { border-top: 3px solid var(--brand--yellow); }

.card--where .card__label { color: #a15a2e; }
.card--where .card__label-dot { background: var(--brand-accent--mandarin-light); }
.card--where { border-top: 3px solid var(--brand-accent--mandarin-light); }

.card--when .card__label { color: #1e7a4c; }
.card--when .card__label-dot { background: var(--brand--secondary--lightgreen); }
.card--when { border-top: 3px solid var(--brand--secondary--lightgreen); }

.card--why .card__label { color: #b23a53; }
.card--why .card__label-dot { background: var(--brand-accent--dusty-red-light); }
.card--why { border-top: 3px solid var(--brand-accent--dusty-red-light); }

/* HOW is the practical, instructional card — made slightly more prominent */
.card--how {
  background: #eef2ff;
  border: 1px solid var(--accent-blue--100);
  border-top: 3px solid var(--action-primary-blue);
}
.card--how .card__label { color: var(--action-primary-blue); }
.card--how .card__label-dot { background: var(--action-primary-blue); }
.card--how .card__body { color: var(--text--dark--50); font-size: 14.5px; }

/* Compact mode: used as a last-resort fallback if a single card can't fit
   at normal size on its own page (kept within accessible size limits). */
.page-inner--compact .section-title { font-size: 19px; }
.page-inner--compact .card { padding: 10px 12px; }
.page-inner--compact .card__body { font-size: 13.5px; line-height: 1.36; }
.page-inner--compact .card__label { font-size: 10.5px; }

/* ==========================================================================
   COVER PAGE
   ========================================================================== */
.cover-page {
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-start;
  text-align: left;
}

.cover-page__eyebrow {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--action-primary-blue);
  background: var(--accent-blue--50);
  padding: 5px 12px;
  border-radius: 999px;
  margin-bottom: 18px;
}

.cover-page__title {
  font-size: 30px;
  font-weight: 800;
  line-height: 1.18;
  color: var(--text--dark--50);
  margin: 0 0 16px;
}

.cover-page__intro {
  font-size: 15.5px;
  line-height: 1.6;
  color: var(--text--dark--40);
  margin: 0 0 22px;
  max-width: 46ch;
}

.cover-page__pill-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.cover-page__pill {
  font-size: 12px;
  font-weight: 700;
  padding: 7px 13px;
  border-radius: 999px;
  background: var(--card-light-grey);
  border: 1px solid var(--ui--underline--light-grey);
  color: var(--text--dark--40);
}

.cover-page__swatch {
  width: 46px;
  height: 6px;
  border-radius: 4px;
  margin-bottom: 22px;
  background: linear-gradient(90deg, var(--action-primary-blue), var(--brand--secondary--lightgreen) 50%, var(--brand--yellow));
}

/* ==========================================================================
   CLOSING PAGE
   ========================================================================== */
.closing-page {
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-start;
}

.closing-page__title {
  font-size: 24px;
  font-weight: 800;
  margin: 0 0 14px;
  color: var(--text--dark--50);
}

.closing-page__body {
  font-size: 15px;
  line-height: 1.6;
  color: var(--text--dark--40);
  margin: 0 0 18px;
  max-width: 46ch;
}

.closing-page__note {
  border-radius: 12px;
  padding: 14px 16px;
  background: var(--white-smoke);
  border: 1px solid var(--brand-accent--dusty-red-light);
  font-size: 13.5px;
  line-height: 1.5;
  color: var(--text--dark--40);
  max-width: 46ch;
}

/* ==========================================================================
   NAVIGATION
   ========================================================================== */
.fb-nav {
  flex: 0 0 var(--nav-h);
  height: var(--nav-h);
  box-sizing: border-box;
  background: var(--brand--black);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px;
  gap: 10px;
}

.nav-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--nav-opacity);
  color: var(--white);
  border: 1px solid rgba(255, 255, 255, 0.16);
  border-radius: 10px;
  padding: 10px 14px;
  min-height: 44px;
  min-width: 76px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s ease, opacity 0.15s ease;
}

.nav-btn:hover:not(:disabled) { background: rgba(255, 255, 255, 0.14); }

.nav-btn:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}

.nav-btn:focus-visible {
  outline: 3px solid var(--accent-blue--100);
  outline-offset: 2px;
}

.fb-nav__progress {
  flex: 1 1 auto;
  min-width: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.fb-nav__page-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-dark-10);
  letter-spacing: 0.02em;
}

.fb-nav__track {
  width: 100%;
  max-width: 220px;
  height: 5px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.14);
  overflow: hidden;
}

.fb-nav__bar {
  height: 100%;
  width: 0%;
  border-radius: 999px;
  background: var(--accent-blue--200);
  transition: width 0.25s ease;
}

@media (prefers-reduced-motion: reduce) {
  .fb-nav__bar { transition: none; }
}

/* ==========================================================================
   LOADING / ERROR STATES
   ========================================================================== */
.state-screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 32px;
  gap: 12px;
  color: var(--text--dark--40);
  font-size: 15px;
}

.spinner {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 3px solid var(--ui--underline--light-grey);
  border-top-color: var(--action-primary-blue);
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

@media (prefers-reduced-motion: reduce) {
  .spinner { animation-duration: 2.4s; }
}

.state-screen--error .state-screen__icon {
  font-size: 30px;
  margin: 0;
}

.state-screen__title {
  font-size: 17px;
  font-weight: 700;
  color: var(--text--dark--50);
  margin: 0;
}

.state-screen__detail {
  font-size: 13.5px;
  max-width: 42ch;
  margin: 0;
}

.btn {
  min-height: 44px;
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 14.5px;
  font-weight: 700;
  border: none;
  cursor: pointer;
}

.btn--primary {
  background: var(--action-primary-blue);
  color: var(--white);
}

.btn--primary:hover { background: #1a39cf; }

.btn:focus-visible {
  outline: 3px solid var(--accent-blue--200);
  outline-offset: 2px;
}

/* ==========================================================================
   SMALL-VIEWPORT SAFETY (embedding frames that squash below 1080px)
   ========================================================================== */
@media (max-width: 1079px) {
  .flip-canvas { width: 100%; }
}


</style>
</head>
<body>

  <div id="flip-canvas" class="flip-canvas">

    <!-- HEADER -->
    <header class="fb-header">
      <div class="fb-header__title">Practising Bank Reconciliation<span class="fb-header__title-sub">in Your Demo Account</span></div>
    </header>

    <!-- PAGE VIEWPORT -->
    <main id="page-viewport" class="page-viewport">

      <!-- LOADING STATE -->
      <div id="state-loading" class="state-screen" role="status">
        <div class="spinner" aria-hidden="true"></div>
        <p>Loading your guide&hellip;</p>
      </div>

      <!-- ERROR STATE -->
      <div id="state-error" class="state-screen state-screen--error" hidden>
        <p class="state-screen__icon" aria-hidden="true">&#9888;</p>
        <p class="state-screen__title">We couldn&rsquo;t load this guide</p>
        <p id="state-error-detail" class="state-screen__detail">Please check your connection and try again.</p>
        <button id="retry-button" class="btn btn--primary" type="button">Try again</button>
      </div>

      <!-- PAGES GET INJECTED HERE ONCE DATA LOADS -->
      <div id="pages-root" class="pages-root" hidden></div>

    </main>

    <!-- NAVIGATION -->
    <nav id="fb-nav" class="fb-nav" aria-label="Guide navigation" hidden>
      <button id="nav-prev" class="nav-btn nav-btn--prev" type="button" aria-label="Previous page">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M15 4l-8 8 8 8" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Back</span>
      </button>

      <div class="fb-nav__progress">
        <span id="nav-page-label" class="fb-nav__page-label">Page 1 of 1</span>
        <div class="fb-nav__track" aria-hidden="true">
          <div id="nav-progress-bar" class="fb-nav__bar"></div>
        </div>
      </div>

      <button id="nav-next" class="nav-btn nav-btn--next" type="button" aria-label="Next page">
        <span>Next</span>
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M9 4l8 8-8 8" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </nav>

  </div>

  <!-- Visually-hidden live region announcing page changes to screen readers,
       kept separate from the visual page content so it doesn't read out the
       entire page body on every navigation. -->
  <span id="sr-page-announce" class="sr-only" aria-live="polite"></span>

  <script>

(function () {
  'use strict';

  /* ==========================================================================
     CONFIG — the only bit you should need to touch day-to-day
     ========================================================================== */
  var CONFIG = {
    // Paste your deployed Apps Script Web App /exec URL here.
    webAppUrl: 'https://script.google.com/macros/s/AKfycbzGUqWrtCCNS--0J-V_eLIfdhUIdM68zPMKW0RhxiuEUnFgH8cs70ICzZqOZGxqw_6L/exec',
    // Which tab this guide reads from (see apps-script.gs).
    sheetParam: 'bankRecon',
    requestTimeoutMs: 12000
  };

  // Card fields, in display order, each with its label and CSS accent class.
  var FIELDS = [
    { key: 'who', label: 'Who' },
    { key: 'what', label: 'What' },
    { key: 'where', label: 'Where' },
    { key: 'when', label: 'When' },
    { key: 'why', label: 'Why' },
    { key: 'how', label: 'How' }
  ];

  var COVER_TITLE = 'Practising Bank Reconciliation';
  var COVER_SUBTITLE = 'in Your Demo Account';
  var COVER_INTRO = 'This guide walks you through safely practising bank imports and reconciliation using your Street demo account, so you can build confidence before working with live client data.';

  var CLOSING_TITLE = 'Ready to have a go';
  var CLOSING_BODY = 'Use your demo account to practise these steps as many times as you like \u2014 nothing here affects live data.';
  var CLOSING_NOTE = 'Please only practise bank reconciliation in your demo account. If you\u2019re ever unsure, contact your Street Accounting Onboarding team.';

  /* ==========================================================================
     DOM REFERENCES
     ========================================================================== */
  var el = {};

  function cacheDom() {
    el.viewport = document.getElementById('page-viewport');
    el.pagesRoot = document.getElementById('pages-root');
    el.loading = document.getElementById('state-loading');
    el.error = document.getElementById('state-error');
    el.errorDetail = document.getElementById('state-error-detail');
    el.retryBtn = document.getElementById('retry-button');
    el.nav = document.getElementById('fb-nav');
    el.navPrev = document.getElementById('nav-prev');
    el.navNext = document.getElementById('nav-next');
    el.navLabel = document.getElementById('nav-page-label');
    el.navBar = document.getElementById('nav-progress-bar');
    el.srAnnounce = document.getElementById('sr-page-announce');
  }

  /* ==========================================================================
     STATE
     ========================================================================== */
  var state = {
    rawRecords: [],
    pageModels: [], // ordered list of everything to render: cover, section pages, closing
    pageEls: [],    // rendered DOM nodes, parallel to pageModels
    currentIndex: 0
  };

  /* ==========================================================================
     TEXT HELPERS
     ========================================================================== */

  // Splits raw cell text into paragraphs, preserving blank-line breaks from the sheet.
  function splitParagraphs(text) {
    return String(text || '')
      .replace(/\r\n/g, '\n')
      .split(/\n{1,}/)
      .map(function (p) { return p.trim(); })
      .filter(Boolean);
  }

  // Recognises simple numbered-step patterns ("1.", "1)", "Step 1:") across several lines.
  var STEP_PATTERN = /^\s*(?:step\s*)?\d+[\.\)\:]\s*/i;

  function looksLikeNumberedSteps(paragraphs) {
    if (paragraphs.length < 2) return false;
    var matches = 0;
    paragraphs.forEach(function (p) { if (STEP_PATTERN.test(p)) matches++; });
    return matches >= Math.ceil(paragraphs.length * 0.6);
  }

  function stripStepMarker(text) {
    return text.replace(STEP_PATTERN, '').trim();
  }

  /* ==========================================================================
     DOM BUILDERS (textContent only \u2014 never innerHTML with sheet data,
     so unexpected characters can never break the page)
     ========================================================================== */

  function createCardNode(fieldKey, label, rawContent) {
    var paragraphs = splitParagraphs(rawContent);
    if (!paragraphs.length) return null; // never render an empty card

    var card = document.createElement('div');
    card.className = 'card card--' + fieldKey;

    var labelRow = document.createElement('div');
    labelRow.className = 'card__label';
    var dot = document.createElement('span');
    dot.className = 'card__label-dot';
    dot.setAttribute('aria-hidden', 'true');
    var labelText = document.createElement('span');
    labelText.textContent = label;
    labelRow.appendChild(dot);
    labelRow.appendChild(labelText);
    card.appendChild(labelRow);

    var body = document.createElement('div');
    body.className = 'card__body';

    if (fieldKey === 'how' && looksLikeNumberedSteps(paragraphs)) {
      var ol = document.createElement('ol');
      paragraphs.forEach(function (p) {
        var li = document.createElement('li');
        li.textContent = stripStepMarker(p);
        ol.appendChild(li);
      });
      body.appendChild(ol);
    } else {
      paragraphs.forEach(function (p) {
        var pEl = document.createElement('p');
        pEl.textContent = p;
        body.appendChild(pEl);
      });
    }

    card.appendChild(body);
    return card;
  }

  function createTitleNode(titleText, continued) {
    var wrap = document.createElement('div');
    wrap.className = 'section-intro-space';

    if (continued) {
      var badge = document.createElement('span');
      badge.className = 'section-continued';
      badge.textContent = 'Continued';
      wrap.appendChild(document.createElement('br'));
      wrap.insertBefore(badge, wrap.firstChild);
    }

    var h = document.createElement('h2');
    h.className = 'section-title';
    h.textContent = titleText || 'Guidance';
    wrap.appendChild(h);

    return wrap;
  }

  function createCardGrid(cardNodes, twoCol) {
    var grid = document.createElement('div');
    grid.className = 'card-grid' + (twoCol ? ' card-grid--two-col' : '');
    cardNodes.forEach(function (c) { grid.appendChild(c); });
    return grid;
  }

  /* ==========================================================================
     DATA -> SECTIONS
     ========================================================================== */

  function buildSections(records) {
    var sections = [];
    records.forEach(function (record) {
      var cardData = [];
      FIELDS.forEach(function (f) {
        var val = record[f.key];
        if (val && String(val).trim()) {
          cardData.push({ key: f.key, label: f.label, text: val });
        }
      });
      var title = (record.guidance || '').toString().trim();
      if (!title && !cardData.length) return; // fully blank, ignore
      sections.push({ title: title || 'Guidance', cards: cardData });
    });
    return sections;
  }

  /* ==========================================================================
     MEASUREMENT RIG
     A hidden .page (same class as every real page, so identical box model,
     padding, fonts and flex behaviour) used purely to test whether a
     candidate arrangement of nodes fits before it is committed to a page.
     ========================================================================== */

  var rig = null;

  function ensureRig() {
    if (rig) return rig;
    var page = document.createElement('div');
    page.className = 'page';
    page.style.zIndex = '-1';
    var inner = document.createElement('div');
    inner.className = 'page-inner';
    page.appendChild(inner);
    el.pagesRoot.appendChild(page);
    rig = { page: page, inner: inner };
    return rig;
  }

  // Returns true if the given content (already-built DOM nodes) fits within
  // one page's real, currently-rendered available height.
  function contentFits(nodes, compact) {
    var r = ensureRig();
    r.inner.className = 'page-inner' + (compact ? ' page-inner--compact' : '');
    r.inner.innerHTML = '';
    nodes.forEach(function (n) { r.inner.appendChild(n); });
    // Force layout before reading measurements.
    // eslint-disable-next-line no-unused-expressions
    r.inner.offsetHeight;
    return r.inner.scrollHeight <= r.inner.clientHeight + 1;
  }

  /* ==========================================================================
     PAGINATION
     Greedily fills each page with as many whole cards as will fit, testing a
     two-column layout (denser, better balance for shorter content) and a
     one-column layout (better for longer content), and only spills onto a
     continuation page ("Continued") when content genuinely doesn't fit.
     ========================================================================== */

  function buildCandidateNodes(title, continued, cardDataSlice, twoCol) {
    var nodes = [createTitleNode(title, continued)];
    var cardNodes = cardDataSlice
      .map(function (c) { return createCardNode(c.key, c.label, c.text); })
      .filter(Boolean);
    nodes.push(createCardGrid(cardNodes, twoCol));
    return nodes;
  }

  function paginateSection(section) {
    var pages = [];
    var remaining = section.cards.slice();

    while (remaining.length) {
      var continued = pages.length > 0;
      var bestN = 0;
      var bestLayout = 'one-col';
      var bestCompact = false;

      // Try to fit as many cards as possible, from all-remaining down to 1.
      outer:
      for (var n = remaining.length; n >= 1; n--) {
        var slice = remaining.slice(0, n);
        var fitsOneCol = contentFits(buildCandidateNodes(section.title, continued, slice, false), false);
        var fitsTwoCol = n >= 2 && contentFits(buildCandidateNodes(section.title, continued, slice, true), false);

        if (fitsOneCol || fitsTwoCol) {
          bestN = n;
          // Prefer the two-column layout when it fits 2+ cards \u2014 it reads
          // more balanced and avoids a lone card stranded on an empty page.
          bestLayout = fitsTwoCol ? 'two-col' : 'one-col';
          bestCompact = false;
          break outer;
        }
      }

      if (bestN === 0) {
        // Even a single card doesn't fit at normal size (an unusually long
        // guidance entry). Fall back to a slightly more compact type scale
        // before accepting it as-is, rather than ever adding a scrollbar.
        var singleSlice = remaining.slice(0, 1);
        var compactFits = contentFits(buildCandidateNodes(section.title, continued, singleSlice, false), true);
        bestN = 1;
        bestLayout = 'one-col';
        bestCompact = true;
        if (!compactFits) {
          console.warn('Bank Recon guide: a single card could not be made to fit even in compact mode \u2014 rendering it anyway to avoid data loss.', section.title);
        }
      }

      var committed = remaining.slice(0, bestN);
      remaining = remaining.slice(bestN);

      pages.push({
        type: 'section',
        title: section.title,
        continued: continued,
        cards: committed,
        twoCol: bestLayout === 'two-col',
        compact: bestCompact
      });
    }

    return pages;
  }

  function paginateAll(sections) {
    var models = [{ type: 'cover' }];
    sections.forEach(function (section) {
      paginateSection(section).forEach(function (p) { models.push(p); });
    });
    models.push({ type: 'closing' });
    return models;
  }

  /* ==========================================================================
     PAGE RENDERING
     ========================================================================== */

  function renderCoverPage() {
    var inner = document.createElement('div');
    inner.className = 'page-inner';

    var page = document.createElement('div');
    page.className = 'cover-page';

    var swatch = document.createElement('div');
    swatch.className = 'cover-page__swatch';
    page.appendChild(swatch);

    var eyebrow = document.createElement('span');
    eyebrow.className = 'cover-page__eyebrow';
    eyebrow.textContent = 'Accounting onboarding guide';
    page.appendChild(eyebrow);

    var h1 = document.createElement('h1');
    h1.className = 'cover-page__title';
    h1.textContent = COVER_TITLE + ' ' + COVER_SUBTITLE;
    page.appendChild(h1);

    var intro = document.createElement('p');
    intro.className = 'cover-page__intro';
    intro.textContent = COVER_INTRO;
    page.appendChild(intro);

    var pillRow = document.createElement('div');
    pillRow.className = 'cover-page__pill-row';
    ['Demo account only', 'Safe to repeat', 'Step-by-step'].forEach(function (t) {
      var pill = document.createElement('span');
      pill.className = 'cover-page__pill';
      pill.textContent = t;
      pillRow.appendChild(pill);
    });
    page.appendChild(pillRow);

    inner.appendChild(page);
    return wrapPage(inner);
  }

  function renderClosingPage() {
    var inner = document.createElement('div');
    inner.className = 'page-inner';

    var page = document.createElement('div');
    page.className = 'closing-page';

    var h2 = document.createElement('h2');
    h2.className = 'closing-page__title';
    h2.textContent = CLOSING_TITLE;
    page.appendChild(h2);

    var body = document.createElement('p');
    body.className = 'closing-page__body';
    body.textContent = CLOSING_BODY;
    page.appendChild(body);

    var note = document.createElement('div');
    note.className = 'closing-page__note';
    note.textContent = CLOSING_NOTE;
    page.appendChild(note);

    inner.appendChild(page);
    return wrapPage(inner);
  }

  function renderSectionPage(model) {
    var inner = document.createElement('div');
    inner.className = 'page-inner' + (model.compact ? ' page-inner--compact' : '');

    inner.appendChild(createTitleNode(model.title, model.continued));

    var cardNodes = model.cards
      .map(function (c) { return createCardNode(c.key, c.label, c.text); })
      .filter(Boolean);
    inner.appendChild(createCardGrid(cardNodes, model.twoCol));

    return wrapPage(inner);
  }

  function wrapPage(innerEl) {
    var page = document.createElement('div');
    page.className = 'page';
    page.appendChild(innerEl);
    return page;
  }

  function renderAllPages() {
    state.pageEls = state.pageModels.map(function (model) {
      if (model.type === 'cover') return renderCoverPage();
      if (model.type === 'closing') return renderClosingPage();
      return renderSectionPage(model);
    });

    // Clear out everything (including the measurement rig) and mount the
    // final pages fresh.
    el.pagesRoot.innerHTML = '';
    rig = null;
    state.pageEls.forEach(function (p) { el.pagesRoot.appendChild(p); });
  }

  /* ==========================================================================
     NAVIGATION
     ========================================================================== */

  function goToPage(index, direction) {
    var total = state.pageEls.length;
    if (index < 0 || index >= total) return;

    state.pageEls.forEach(function (p, i) {
      p.classList.remove('is-active', 'is-leaving-back');
      if (i === index) {
        p.classList.add('is-active');
      } else if (direction === 'back' && i === state.currentIndex) {
        p.classList.add('is-leaving-back');
      }
    });

    state.currentIndex = index;
    updateNavUI();
  }

  function updateNavUI() {
    var total = state.pageEls.length;
    var current = state.currentIndex + 1;
    el.navLabel.textContent = current + ' of ' + total;
    el.navBar.style.width = (current / total * 100) + '%';
    el.navPrev.disabled = state.currentIndex === 0;
    el.navNext.disabled = state.currentIndex === total - 1;
    if (el.srAnnounce) el.srAnnounce.textContent = 'Page ' + current + ' of ' + total;
  }

  function next() {
    if (state.currentIndex < state.pageEls.length - 1) goToPage(state.currentIndex + 1, 'forward');
  }

  function prev() {
    if (state.currentIndex > 0) goToPage(state.currentIndex - 1, 'back');
  }

  function bindNavEvents() {
    el.navNext.addEventListener('click', next);
    el.navPrev.addEventListener('click', prev);

    document.addEventListener('keydown', function (e) {
      if (el.nav.hidden) return;
      if (e.key === 'ArrowRight') { next(); }
      else if (e.key === 'ArrowLeft') { prev(); }
    });

    var touchStartX = null;
    el.viewport.addEventListener('touchstart', function (e) {
      touchStartX = e.changedTouches[0].clientX;
    }, { passive: true });
    el.viewport.addEventListener('touchend', function (e) {
      if (touchStartX === null) return;
      var dx = e.changedTouches[0].clientX - touchStartX;
      touchStartX = null;
      if (Math.abs(dx) < 40) return;
      if (dx < 0) next(); else prev();
    }, { passive: true });
  }

  /* ==========================================================================
     RECALCULATION (resize / font changes)
     ========================================================================== */

  var recalcTimer = null;
  function scheduleRecalc() {
    clearTimeout(recalcTimer);
    recalcTimer = setTimeout(function () {
      if (!state.rawRecords.length) return;
      var sections = buildSections(state.rawRecords);
      state.pageModels = paginateAll(sections);
      renderAllPages();
      var clamped = Math.min(state.currentIndex, state.pageEls.length - 1);
      goToPage(Math.max(clamped, 0));
    }, 200);
  }

  window.addEventListener('resize', scheduleRecalc);
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(scheduleRecalc)['catch'](function () {});
  }

  /* ==========================================================================
     STATE SCREENS
     ========================================================================== */

  function showLoading() {
    el.loading.hidden = false;
    el.error.hidden = true;
    el.pagesRoot.hidden = true;
    el.nav.hidden = true;
  }

  function showError(message) {
    el.loading.hidden = true;
    el.error.hidden = false;
    el.pagesRoot.hidden = true;
    el.nav.hidden = true;
    el.errorDetail.textContent = message;
  }

  function showGuide() {
    el.loading.hidden = true;
    el.error.hidden = true;
    el.pagesRoot.hidden = false;
    el.nav.hidden = false;
  }

  /* ==========================================================================
     DATA LOADING (JSONP \u2014 avoids cross-origin issues with the Apps
     Script /exec endpoint when called from a GitHub Pages origin)
     ========================================================================== */

  function loadData() {
    showLoading();

    if (!CONFIG.webAppUrl || CONFIG.webAppUrl.indexOf('PASTE_YOUR') === 0) {
      console.error('Bank Recon guide: CONFIG.webAppUrl has not been set in script.js.');
      showError('This guide isn\u2019t connected to its data source yet.');
      return;
    }

    var callbackName = 'bankReconCb_' + Date.now() + '_' + Math.floor(Math.random() * 10000);
    var finished = false;
    var scriptEl = null;

    function cleanup() {
      delete window[callbackName];
      if (scriptEl && scriptEl.parentNode) scriptEl.parentNode.removeChild(scriptEl);
    }

    var timeoutId = setTimeout(function () {
      if (finished) return;
      finished = true;
      cleanup();
      console.error('Bank Recon guide: request to Apps Script timed out.');
      showError('This is taking longer than expected. Please check your connection and try again.');
    }, CONFIG.requestTimeoutMs);

    window[callbackName] = function (payload) {
      if (finished) return;
      finished = true;
      clearTimeout(timeoutId);
      cleanup();
      handlePayload(payload);
    };

    scriptEl = document.createElement('script');
    var sep = CONFIG.webAppUrl.indexOf('?') > -1 ? '&' : '?';
    scriptEl.src = CONFIG.webAppUrl + sep + 'sheet=' + encodeURIComponent(CONFIG.sheetParam) + '&callback=' + callbackName;
    scriptEl.onerror = function () {
      if (finished) return;
      finished = true;
      clearTimeout(timeoutId);
      cleanup();
      console.error('Bank Recon guide: the Apps Script request failed to load (network or deployment issue).');
      showError('Could not reach the guide data. Please check your connection and try again.');
    };
    document.body.appendChild(scriptEl);
  }

  function handlePayload(payload) {
    if (!payload || payload.success !== true || !Array.isArray(payload.data)) {
      console.error('Bank Recon guide: Apps Script returned an unexpected or unsuccessful response.', payload);
      showError((payload && payload.error) || 'No guidance data is available right now.');
      return;
    }

    var sections = buildSections(payload.data);
    if (!sections.length) {
      console.error('Bank Recon guide: no active rows were returned.', payload);
      showError('No active guidance is available right now. Please check back later.');
      return;
    }

    state.rawRecords = payload.data;
    state.pageModels = paginateAll(sections);
    renderAllPages();
    showGuide();
    goToPage(0);
  }

  /* ==========================================================================
     INIT
     ========================================================================== */

  function init() {
    cacheDom();
    bindNavEvents();
    el.retryBtn.addEventListener('click', loadData);
    loadData();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();


</script>
</body>
</html>
